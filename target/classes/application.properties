spring.application.name=api-gateway
spring.profiles.active=dev

spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**,/api/users/**,/api/addresses/**

spring.cloud.gateway.routes[1].id=restaurant-service
spring.cloud.gateway.routes[1].uri=lb://restaurant-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/restaurants/**,/api/menu-items/**

spring.cloud.gateway.routes[2].id=order-cart-service
spring.cloud.gateway.routes[2].uri=lb://order-cart-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/cart/**,/orders/**

spring.cloud.gateway.routes[3].id=payment-service
spring.cloud.gateway.routes[3].uri=lb://payment-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/payments/**

spring.cloud.gateway.httpclient.connect-timeout=30000
spring.cloud.gateway.httpclient.response-timeout=30s
spring.cloud.gateway.httpclient.pool.max-idle-time=30000

